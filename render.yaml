# Render Blueprint — 无障碍出行陪伴平台
# 一键部署：https://render.com/docs/blueprint-spec

services:
  # ---- 后端 API 服务 ----
  - type: web
    name: accessible-travel-api
    env: node
    region: singapore  # 亚太区延迟低
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: accessible-travel-db
          property: connectionString

databases:
  # ---- PostgreSQL 数据库 ----
  - name: accessible-travel-db
    plan: free
    region: singapore
    postgresMajorVersion: 16
